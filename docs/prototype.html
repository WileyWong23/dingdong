<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>叮咚 DingDong - 设计原型</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAFA;--surface:#FFF;--text:#1D1D1F;--text2:#6E6E73;--border:#D2D2D7;--accent:#007AFF;--green:#34C759;--orange:#FF9500;--red:#FF3B30;--shadow:0 1px 3px rgba(0,0,0,0.04)}
[data-theme="dark"]{--bg:#000;--surface:#1C1C1E;--text:#FFF;--text2:#8E8E93;--border:#38383A;--shadow:0 1px 3px rgba(255,255,255,0.04)}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
.tabs{display:flex;justify-content:center;gap:8px;padding:16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.tab{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:500;transition:all .2s}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.theme-toggle{position:fixed;top:16px;right:16px;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:16px;z-index:200;display:flex;align-items:center;justify-content:center}
.page{max-width:430px;margin:0 auto;padding:0 20px;display:none}
.page.active{display:block}

/* Header */
.page-header{padding:24px 0 16px}
.page-title{font-size:34px;font-weight:700;letter-spacing:-0.5px}

/* Section */
.section-header{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;padding:20px 0 8px}

/* Card */
.card{background:var(--surface);border-radius:16px;padding:16px;margin-bottom:8px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;transition:transform .1s}
.card:active{transform:scale(0.98)}
.check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.check.done{background:var(--green);border-color:var(--green)}
.check.done::after{content:"✓";color:#fff;font-size:14px;font-weight:700}
.card-body{flex:1;min-width:0}
.card-title{font-size:17px;font-weight:500}
.card-title.done{text-decoration:line-through;color:var(--text2)}
.card-desc{font-size:13px;color:var(--text2);margin-top:2px}
.card-time{font-size:15px;font-weight:500;color:var(--text2);flex-shrink:0}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;margin-top:4px}
.tag-repeat{background:#E8F4FF;color:var(--accent)}
.tag-once{background:#FFF3E0;color:var(--orange)}

/* FAB */
.fab{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:390px;height:50px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(0,122,255,0.3);transition:transform .1s,box-shadow .2s;z-index:50}
.fab:active{transform:translateX(-50%) scale(0.97)}
.fab:hover{box-shadow:0 6px 20px rgba(0,122,255,0.4)}

/* Empty State */
.empty{text-align:center;padding:80px 20px}
.empty-icon{font-size:64px;margin-bottom:16px}
.empty-title{font-size:22px;font-weight:600;margin-bottom:8px}
.empty-desc{font-size:15px;color:var(--text2);line-height:1.5}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:300;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);width:100%;max-width:430px;border-radius:16px 16px 0 0;padding:16px 20px 32px;max-height:85vh;overflow-y:auto;animation:slideUp .3s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:20px}
.input-group{margin-bottom:16px}
.input-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}
.input{width:100%;height:48px;border:1px solid var(--border);border-radius:12px;padding:0 16px;font-size:16px;background:var(--bg);color:var(--text);outline:none;transition:border-color .2s;font-family:inherit}
.input:focus{border-color:var(--accent)}
.textarea{height:80px;padding:12px 16px;resize:none}
.row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer}
.row:last-child{border-bottom:none}
.row-left{display:flex;align-items:center;gap:10px;font-size:16px}
.row-arrow{color:var(--text2);font-size:14px}
.btn-primary{width:100%;height:50px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .2s}
.btn-primary:active{opacity:0.8}

/* Schedule Page */
.schedule-page{padding:20px 0}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px}
.preset{padding:14px;border-radius:12px;border:1px solid var(--border);text-align:center;cursor:pointer;font-size:15px;font-weight:500;transition:all .2s;background:var(--surface)}
.preset.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.section-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px}
.inline-inputs{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.inline-input{width:72px;height:44px;border:1px solid var(--border);border-radius:10px;text-align:center;font-size:17px;font-weight:500;background:var(--bg);color:var(--text);outline:none;font-family:inherit}
.inline-input:focus{border-color:var(--accent)}
.inline-label{font-size:15px;color:var(--text2)}
.time-range{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.time-input{flex:1;height:48px;border:1px solid var(--border);border-radius:12px;text-align:center;font-size:20px;font-weight:500;background:var(--bg);color:var(--text);outline:none;font-family:inherit}
.time-input:focus{border-color:var(--accent)}
.time-sep{font-size:20px;color:var(--text2)}
.days{display:flex;gap:8px;margin-bottom:24px}
.day{width:44px;height:44px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;background:var(--surface)}
.day.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.save-btn{width:100%;height:50px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:600;cursor:pointer}
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">🌓</button>

<div class="tabs">
<button class="tab active" onclick="showPage('home',this)">首页</button>
<button class="tab" onclick="showPage('empty',this)">空状态</button>
<button class="tab" onclick="showPage('modal',this)">新建</button>
<button class="tab" onclick="showPage('schedule',this)">重复规则</button>
</div>

<!-- PAGE: Home -->
<div id="page-home" class="page active">
<div class="page-header"><h1 class="page-title">提醒</h1></div>

<div class="section-header">今天的提醒 (3)</div>

<div class="card">
<div class="check" onclick="this.classList.toggle('done');this.nextElementSibling.querySelector('.card-title').classList.toggle('done')"></div>
<div class="card-body">
<div class="card-title">每小时喝水</div>
<div class="card-desc">每天 09:00 - 21:00，每隔1小时</div>
<div><span class="tag tag-repeat">🔄 重复</span></div>
</div>
<div class="card-time">09:00</div>
</div>

<div class="card">
<div class="check done" onclick="this.classList.toggle('done');this.nextElementSibling.querySelector('.card-title').classList.toggle('done')"></div>
<div class="card-body">
<div class="card-title done">团队站会</div>
<div class="card-desc">每天 10:00</div>
<div><span class="tag tag-repeat">🔄 重复</span></div>
</div>
<div class="card-time" style="text-decoration:line-through">10:00</div>
</div>

<div class="card">
<div class="check" onclick="this.classList.toggle('done');this.nextElementSibling.querySelector('.card-title').classList.toggle('done')"></div>
<div class="card-body">
<div class="card-title">取快递</div>
<div class="card-desc">今天 15:30</div>
<div><span class="tag tag-once">📌 一次</span></div>
</div>
<div class="card-time">15:30</div>
</div>

<div class="section-header">明天的提醒 (1)</div>

<div class="card">
<div class="check" onclick="this.classList.toggle('done');this.nextElementSibling.querySelector('.card-title').classList.toggle('done')"></div>
<div class="card-body">
<div class="card-title">健身</div>
<div class="card-desc">每周一三五 18:00</div>
<div><span class="tag tag-repeat">🔄 重复</span></div>
</div>
<div class="card-time">18:00</div>
</div>

<div style="height:80px"></div>
<button class="fab" onclick="showPage('modal',document.querySelectorAll('.tab')[2])">+ 新建提醒</button>
</div>

<!-- PAGE: Empty -->
<div id="page-empty" class="page">
<div class="page-header"><h1 class="page-title">提醒</h1></div>
<div class="empty">
<div class="empty-icon">🔔</div>
<div class="empty-title">还没有任何提醒</div>
<div class="empty-desc">点击下方按钮，创建你的第一个提醒</div>
</div>
<div style="height:80px"></div>
<button class="fab" onclick="showPage('modal',document.querySelectorAll('.tab')[2])">+ 新建提醒</button>
</div>

<!-- PAGE: Modal Preview -->
<div id="page-modal" class="page">
<div style="padding:40px 0;text-align:center">
<div style="font-size:48px;margin-bottom:16px">📱</div>
<div style="font-size:17px;font-weight:600;margin-bottom:8px">点击下方按钮查看弹出面板</div>
<div style="font-size:14px;color:var(--text2)">模拟 iOS 风格的底部弹出创建流程</div>
</div>
<button class="fab" onclick="document.getElementById('modal-overlay').classList.add('show')">打开新建面板</button>
</div>

<!-- PAGE: Schedule -->
<div id="page-schedule" class="page">
<div class="page-header"><h1 class="page-title">重复规则</h1></div>

<div class="section-label">预设方案</div>
<div class="preset-grid">
<div class="preset active" onclick="selectPreset(this)">每天</div>
<div class="preset" onclick="selectPreset(this)">每周</div>
<div class="preset" onclick="selectPreset(this)">每月</div>
<div class="preset" onclick="selectPreset(this)">自定义</div>
</div>

<div class="section-label">重复间隔</div>
<div class="inline-inputs">
<span class="inline-label">每</span>
<input type="number" class="inline-input" value="1">
<span class="inline-label">小时</span>
</div>

<div class="section-label">有效时间范围</div>
<div class="time-range">
<input type="text" class="time-input" value="09:00">
<span class="time-sep">→</span>
<input type="text" class="time-input" value="21:00">
</div>

<div class="section-label">重复日期</div>
<div class="days">
<div class="day" onclick="this.classList.toggle('active')">日</div>
<div class="day active" onclick="this.classList.toggle('active')">一</div>
<div class="day active" onclick="this.classList.toggle('active')">二</div>
<div class="day active" onclick="this.classList.toggle('active')">三</div>
<div class="day active" onclick="this.classList.toggle('active')">四</div>
<div class="day active" onclick="this.classList.toggle('active')">五</div>
<div class="day" onclick="this.classList.toggle('active')">六</div>
</div>

<button class="save-btn">保存规则</button>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)this.classList.remove('show')">
<div class="modal">
<div class="modal-handle"></div>
<div class="modal-title">新建提醒</div>

<div class="input-group">
<label class="input-label">提醒标题</label>
<input type="text" class="input" placeholder="例如：喝水、吃药、开会...">
</div>

<div class="input-group">
<label class="input-label">提醒内容（选填）</label>
<textarea class="input textarea" placeholder="添加详细说明..."></textarea>
</div>

<div class="row" onclick="alert('打开时间选择器')">
<div class="row-left">📅 <span>选择时间</span></div>
<span class="row-arrow">›</span>
</div>

<div class="row" onclick="showPage('schedule',document.querySelectorAll('.tab')[3]);document.getElementById('modal-overlay').classList.remove('show')">
<div class="row-left">🔄 <span>重复规则</span></div>
<span class="row-arrow">›</span>
</div>

<div style="margin-top:20px">
<button class="btn-primary">保存提醒</button>
</div>
</div>
</div>

<script>
function showPage(id, tab){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById('page-'+id).classList.add('active');
if(tab) tab.classList.add('active');
}
function toggleTheme(){
document.documentElement.toggleAttribute('data-theme');
if(document.documentElement.hasAttribute('data-theme')){
document.documentElement.setAttribute('data-theme','dark');
}else{
document.documentElement.removeAttribute('data-theme');
}
}
function selectPreset(el){
el.parentElement.querySelectorAll('.preset').forEach(p=>p.classList.remove('active'));
el.classList.add('active');
}
</script>
</body>
</html>
